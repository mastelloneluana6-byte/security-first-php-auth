<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" width="1200" height="360" role="img" aria-label="Security-First PHP Authentication banner">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#050b14"/>
      <stop offset="45%" style="stop-color:#0a1628"/>
      <stop offset="100%" style="stop-color:#0c1e3d"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" style="stop-color:#22d3ee;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#38bdf8;stop-opacity:0.35"/>
      <stop offset="100%" style="stop-color:#22d3ee;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#67e8f9"/>
      <stop offset="100%" style="stop-color:#0284c7"/>
    </linearGradient>
    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="24"/>
    </filter>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="#1e3a5f" stroke-width="0.6" opacity="0.45"/>
    </pattern>
  </defs>
  <rect width="1200" height="360" fill="url(#bg)"/>
  <rect width="1200" height="360" fill="url(#grid)"/>
  <ellipse cx="980" cy="40" rx="220" ry="120" fill="#0ea5e9" opacity="0.08" filter="url(#blur)"/>
  <ellipse cx="180" cy="300" rx="280" ry="140" fill="#2563eb" opacity="0.1" filter="url(#blur)"/>
  <rect x="0" y="0" width="1200" height="360" fill="url(#glow)"/>
  <rect x="64" y="100" width="4" height="160" rx="2" fill="url(#accent)" opacity="0.95"/>
  <text x="92" y="148" fill="#94a3b8" font-family="Segoe UI, system-ui, sans-serif" font-size="15" font-weight="600" letter-spacing="0.35em">CYBERSECURITY ENGINEERING</text>
  <text x="92" y="210" fill="#f8fafc" font-family="Segoe UI, system-ui, sans-serif" font-size="42" font-weight="700" letter-spacing="-0.02em">Security-First PHP Auth</text>
  <text x="92" y="248" fill="#7dd3fc" font-family="Segoe UI, system-ui, sans-serif" font-size="18" font-weight="500">Argon2id · PDO · Session hardening · SQL rate limiting</text>
  <g transform="translate(1000 88)" opacity="0.9">
    <circle cx="48" cy="48" r="46" fill="none" stroke="#38bdf8" stroke-width="2" opacity="0.5"/>
    <path d="M48 22 L62 32 V52 C62 62 48 70 48 70 S34 62 34 52 V32 Z" fill="none" stroke="#22d3ee" stroke-width="2.2" stroke-linejoin="round"/>
    <circle cx="48" cy="48" r="6" fill="#22d3ee" opacity="0.85"/>
  </g>
  <line x1="92" y1="268" x2="520" y2="268" stroke="#334155" stroke-width="1" opacity="0.8"/>
  <text x="92" y="298" fill="#64748b" font-family="Segoe UI, Consolas, monospace" font-size="13" letter-spacing="0.08em">PURE PHP · ZERO FRAMEWORKS · DEFENSE IN DEPTH</text>
</svg>
