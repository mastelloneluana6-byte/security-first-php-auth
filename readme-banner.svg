<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1280" y2="640" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#020617"/>
      <stop offset="0.45" stop-color="#0a1628"/>
      <stop offset="1" stop-color="#0c1e3d"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0" stop-color="#0f172a" stop-opacity="0.72"/>
      <stop offset="1" stop-color="#020617" stop-opacity="0.55"/>
    </linearGradient>
    <pattern id="fineGrid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" fill="none" stroke="#38bdf8" stroke-width="0.4" opacity="0.12"/>
    </pattern>
  </defs>

  <rect width="1280" height="640" fill="url(#bgGrad)"/>
  <rect width="1280" height="640" fill="url(#fineGrid)" opacity="0.9"/>

  <ellipse cx="200" cy="480" rx="420" ry="320" fill="#00f5ff" fill-opacity="0.07"/>
  <ellipse cx="1020" cy="140" rx="380" ry="300" fill="#60a5fa" fill-opacity="0.06"/>
  <ellipse cx="720" cy="380" rx="500" ry="280" fill="#38bdf8" fill-opacity="0.04"/>

  <g fill="#38bdf8" fill-opacity="0.07" font-family="Consolas, monospace" font-size="10">
    <text x="40" y="28">namespace App\Security;</text>
    <text x="40" y="42">final class RateLimiter { private PDO $pdo; }</text>
    <text x="40" y="56">DELETE FROM login_attempts WHERE ip_address = :ip</text>
    <text x="40" y="70">PDO::ATTR_EMULATE_PREPARES =&gt; false</text>
    <text x="380" y="22">hash_equals($sessionToken, $postedToken);</text>
    <text x="380" y="36">ini_set('session.cookie_httponly', '1');</text>
    <text x="380" y="50">password_needs_rehash($hash, PASSWORD_ARGON2ID)</text>
    <text x="720" y="30">$config = require __DIR__ . '/../config/config.php';</text>
    <text x="720" y="44">header('X-Content-Type-Options: nosniff');</text>
    <text x="980" y="26">INSERT INTO login_attempts (ip_address, attempted_at)</text>
    <text x="980" y="40">VALUES (:ip, NOW())</text>
    <text x="980" y="54">if ($attempts &gt;= $max) { $blockedUntil = ... }</text>
    <text x="180" y="600">htmlspecialchars($message, ENT_QUOTES, 'UTF-8')</text>
    <text x="180" y="614">csrf_token hidden input + POST validate</text>
    <text x="520" y="598">public/index.php -&gt; Location: /login.php</text>
    <text x="520" y="612">require_once __DIR__ . '/../src/bootstrap.php';</text>
    <text x="880" y="602">CREATE TABLE users ( email VARCHAR(190) UNIQUE ...</text>
    <text x="880" y="616">ENGINE=InnoDB CHARSET=utf8mb4</text>
  </g>

  <g fill="#60a5fa" fill-opacity="0.11" font-family="Consolas, monospace" font-size="11" transform="translate(0 140)">
    <text x="24" y="0">// rate-limit</text>
    <text x="24" y="18">$ip = $_SERVER['REMOTE_ADDR'];</text>
    <text x="24" y="36">$stmt-&gt;prepare(...);</text>
    <text x="24" y="54">session_regenerate_id(true);</text>
    <text x="24" y="72">HttpOnly + SameSite</text>
    <text x="24" y="90">PASSWORD_ARGON2ID</text>
  </g>

  <g transform="translate(560 88) rotate(-4)" font-family="Consolas, monospace" font-size="14" fill="#00f5ff" fill-opacity="0.14">
    <text x="0" y="0">// ADVANCED SECURITY CORE</text>
    <text x="0" y="22">$hash = password_hash($p, PASSWORD_ARGON2ID, $opts);</text>
    <text x="0" y="44">$stmt = $pdo-&gt;prepare(</text>
    <text x="0" y="66">  'SELECT id, password_hash FROM users WHERE email = :e'</text>
    <text x="0" y="88">);</text>
    <text x="0" y="110">$stmt-&gt;execute(['e' =&gt; $email]);</text>
    <text x="0" y="132">if (!password_verify($pass, $row['password_hash'])) {</text>
    <text x="0" y="154">  $rateLimiter-&gt;registerFailure($ip);</text>
    <text x="0" y="176">}</text>
    <text x="0" y="198">session_regenerate_id(true);</text>
    <text x="0" y="220">header('X-Frame-Options: DENY');</text>
  </g>

  <rect x="920" y="72" width="340" height="118" rx="10" fill="#020617" fill-opacity="0.75" stroke="#00f5ff" stroke-opacity="0.35" stroke-width="1"/>
  <text x="936" y="96" fill="#38bdf8" font-family="Consolas, monospace" font-size="10">$ php -r echo PASSWORD_ARGON2ID ok or no</text>
  <text x="936" y="112" fill="#93c5fd" fill-opacity="0.5" font-family="Consolas, monospace" font-size="10"># schema: users | login_attempts</text>
  <text x="936" y="128" fill="#38bdf8" fill-opacity="0.45" font-family="Consolas, monospace" font-size="10">mysql&gt; SELECT COUNT(*) FROM login_attempts;</text>
  <text x="936" y="144" fill="#38bdf8" fill-opacity="0.35" font-family="Consolas, monospace" font-size="10">sliding window + blocked_until</text>
  <text x="936" y="160" fill="#60a5fa" fill-opacity="0.4" font-family="Consolas, monospace" font-size="10">git log oneline head n 3</text>
  <text x="936" y="176" fill="#93c5fd" fill-opacity="0.35" font-family="Consolas, monospace" font-size="10">composer: none zero-framework</text>

  <rect x="56" y="96" width="720" height="468" rx="18" fill="url(#cardGrad)" stroke="#00f5ff" stroke-opacity="0.28" stroke-width="1.5"/>
  <rect x="56" y="96" width="720" height="468" rx="18" fill="none" stroke="#60a5fa" stroke-opacity="0.15" stroke-width="6" opacity="0.5"/>

  <polyline points="760,520 800,480 860,500 920,440 980,460 1040,400 1100,420" fill="none" stroke="#00f5ff" stroke-opacity="0.25" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="780,540 830,510 890,530 950,470 1010,490" fill="none" stroke="#60a5fa" stroke-opacity="0.2" stroke-width="1.5" stroke-linecap="round"/>

  <rect x="88" y="124" width="178" height="42" rx="8" fill="#00f5ff" fill-opacity="0.12" stroke="#00f5ff" stroke-width="1.5"/>
  <text x="177" y="152" text-anchor="middle" fill="#e0f2fe" font-family="Segoe UI, Arial, sans-serif" font-size="17" font-weight="800" letter-spacing="1">PHP 8.3 + SQL</text>

  <text x="88" y="206" fill="#38bdf8" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="800" letter-spacing="5">CYBERSECURITY ENGINEERING</text>

  <text x="88" y="286" fill="#7dd3fc" font-family="Segoe UI, Arial, sans-serif" font-size="70" font-weight="900">Hardened Auth</text>
  <text x="88" y="368" fill="#00f5ff" font-family="Segoe UI, Arial, sans-serif" font-size="70" font-weight="900">System</text>

  <text x="88" y="424" fill="#93c5fd" font-family="Courier New, monospace" font-size="21">Zero-Trust Architecture // Defense In Depth</text>

  <g font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="800">
    <rect x="88" y="452" width="124" height="42" rx="8" fill="#00f5ff" fill-opacity="0.08" stroke="#00f5ff" stroke-width="1.5"/>
    <text x="150" y="479" text-anchor="middle" fill="#7dd3fc">ARGON2ID</text>
    <rect x="224" y="452" width="210" height="42" rx="8" fill="#60a5fa" fill-opacity="0.08" stroke="#60a5fa" stroke-width="1.5"/>
    <text x="329" y="479" text-anchor="middle" fill="#93c5fd">PDO PREPARED ONLY</text>
    <rect x="448" y="452" width="220" height="42" rx="8" fill="#00f5ff" fill-opacity="0.08" stroke="#38bdf8" stroke-width="1.5"/>
    <text x="558" y="479" text-anchor="middle" fill="#7dd3fc">BRUTE-FORCE SHIELD</text>
  </g>
</svg>
